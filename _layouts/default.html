<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

  <header class="site-nav">
    <span class="nav-brand">{{ site.author.name }}</span>
    <span class="nav-path">~/<span id="nav-current">home</span></span>
  </header>

  <main id="main-content">
    {{ content }}
  </main>

  <div class="terminal-bar">
    <div class="terminal-menu" id="terminal-menu">
      <span class="menu-item active" data-target="home"><span class="menu-num">[1]</span> home</span>
      <span class="menu-item" data-target="about"><span class="menu-num">[2]</span> about</span>
      <span class="menu-item" data-target="curriculum"><span class="menu-num">[3]</span> curriculum</span>
      <span class="menu-item" data-target="publications"><span class="menu-num">[4]</span> publications</span>
    </div>
    <div class="terminal-input-line">
      <span class="ti-prompt">visitor@portfolio:~$</span>
      <input
        type="text"
        id="terminal-input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="1–4 or section name…"
      />
    </div>
    <div class="terminal-feedback" id="terminal-feedback"></div>
  </div>

  <script>
    // ─── Router ──────────────────────────────────────────────────────────────
    const routes = {
      '1': 'home',         'home': 'home',
      '2': 'about',        'about': 'about',        'aboutme': 'about',
      '3': 'curriculum',   'curriculum': 'curriculum', 'cv': 'curriculum',
      '4': 'publications', 'publications': 'publications', 'pub': 'publications',
    };

    const sections   = document.querySelectorAll('.page-section');
    const menuItems  = document.querySelectorAll('.menu-item');
    const navCurrent = document.getElementById('nav-current');
    const input      = document.getElementById('terminal-input');
    const feedback   = document.getElementById('terminal-feedback');

    let cmdHistory = [];
    let histIndex  = -1;
    let feedTimer  = null;

    // ─── Animation engine ────────────────────────────────────────────────────
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    let animCtrl = null;

    async function typeChars(el, text, speed) {
      el.textContent = '';
      for (let i = 0; i < text.length; i++) {
        if (animCtrl?.cancelled) return;
        el.textContent += text[i];
        await sleep(speed);
      }
    }

    async function animateSection(section) {
      // Cancel any running animation
      if (animCtrl) animCtrl.cancelled = true;
      const ctrl = { cancelled: false };
      animCtrl = ctrl;

      // Collect blocks
      const blocks = section.querySelectorAll('.term-block');

      // Reset all animated elements
      blocks.forEach(block => {
        const cmd = block.querySelector('.tw-cmd');
        if (cmd) {
          if (!cmd.dataset.orig) cmd.dataset.orig = cmd.textContent;
          cmd.textContent = '';
        }
        block.querySelectorAll('.tw-text').forEach(el => {
          if (!el.dataset.orig) el.dataset.orig = el.textContent;
          el.textContent = '';
        });
        block.querySelectorAll('.tw-item').forEach(el => {
          el.classList.remove('tw-visible');
        });
      });

      // Animate block by block
      for (const block of blocks) {
        if (ctrl.cancelled) return;

        // 1. Type the command
        const cmd = block.querySelector('.tw-cmd');
        if (cmd) {
          await typeChars(cmd, cmd.dataset.orig, 46);
          if (ctrl.cancelled) return;
          await sleep(90);
        }

        // 2. Type text paragraphs one by one
        for (const el of block.querySelectorAll('.tw-text')) {
          if (ctrl.cancelled) return;
          await typeChars(el, el.dataset.orig, 11);
          if (ctrl.cancelled) return;
        }

        // 3. Reveal items sequentially
        for (const item of block.querySelectorAll('.tw-item')) {
          if (ctrl.cancelled) return;
          item.classList.add('tw-visible');
          await sleep(90);
        }

        if (ctrl.cancelled) return;
        await sleep(130);
      }
    }

    // ─── Navigation ──────────────────────────────────────────────────────────
    function showSection(id) {
      sections.forEach(s => s.classList.remove('active'));
      menuItems.forEach(m => m.classList.toggle('active', m.dataset.target === id));

      const target = document.getElementById(id);
      if (!target) return;
      target.classList.add('active');
      navCurrent.textContent = id;
      history.replaceState(null, '', '#' + id);

      animateSection(target);
    }

    // ─── Input handling ──────────────────────────────────────────────────────
    function setFeedback(msg, isError) {
      feedback.textContent = msg;
      feedback.className = 'terminal-feedback ' + (isError ? 'error' : 'ok');
      clearTimeout(feedTimer);
      feedTimer = setTimeout(() => { feedback.textContent = ''; feedback.className = 'terminal-feedback'; }, 2200);
    }

    function handleCommand(raw) {
      const cmd = raw.trim().toLowerCase();
      if (!cmd) return;
      const target = routes[cmd];
      if (target) {
        showSection(target);
        setFeedback('→ ' + target, false);
      } else {
        setFeedback('-bash: ' + cmd + ': command not found', true);
      }
      if (raw.trim()) { cmdHistory.unshift(raw); histIndex = -1; }
      input.value = '';
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        handleCommand(input.value);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIndex < cmdHistory.length - 1) input.value = cmdHistory[++histIndex];
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        histIndex > 0 ? (input.value = cmdHistory[--histIndex]) : (histIndex = -1, input.value = '');
      }
    });

    menuItems.forEach(item => {
      item.addEventListener('click', () => { showSection(item.dataset.target); input.focus(); });
    });

    document.querySelector('.terminal-bar').addEventListener('click', () => input.focus());

    // ─── Init ─────────────────────────────────────────────────────────────────
    const hash  = location.hash.replace('#', '').toLowerCase();
    const valid = ['home', 'about', 'curriculum', 'publications'];
    showSection(valid.includes(hash) ? hash : 'home');
    input.focus();
  </script>
</body>
</html>
