- title: "Experimental and theoretical study of Volatile Organic Compounds fragmentation for environmental applications."
  authors: "A. Chollet"
  venue: "PhD Thesis, University of Paris-Saclay"
  year: 2015
  url: "https://theses.hal.science/tel-01179825/"
  description: "This thesis focuses on the experimental and theoretical study of fragmentation of organic molecules. A new non-thermal plasma reactor was built and a statistical fragmentation model (Microcanonical Metropolis Monte Carlo) was adapted to describe the fragmentation of CnHm species. The non-thermal plasma is created by a nanosecond high-voltage pulse (100 kV) with a very steep rise front (15-20 kV.ns⁻¹), allowing generation of large diffuse plasma volume and high densities of reactive species capable of reacting with organic molecules."

- title: "On the Influence of Anode Composition on the Pattern of a Nanosecond Diffuse Discharge at Atmospheric Pressure."
  authors: "A. Chollet, P. Jeanney, S. Pasquiers, P. Tardiveau"
  venue: "IEEE Transactions on Plasma Science"
  year: 2014
  url: "https://ieeexplore.ieee.org/abstract/document/6894610/"
  description: "A diffuse discharge is generated in atmospheric air under a nanosecond range overvoltage. The influence of the anode composition on the diffuse pattern is studied and images of the electrical streamer pattern are analyzed to understand how different anode materials affect the discharge characteristics."

- title: "Experimental and theoretical study of Volatile Organic Compounds fragmentation for environmental applications."
  authors: "A. Chollet, P. Tardiveau"
  venue: "International Atomic Energy Agency (IAEA)"
  year: 2015
  url: "https://inis.iaea.org/records/bhcav-cs052"
  description: "This work presents an experimental and theoretical study of organic compounds fragmentation using non-thermal plasma. A new plasma reactor was developed and a statistical model of fragmentation was adapted to describe the fragmentation of CnHm species, with applications for environmental remediation."
